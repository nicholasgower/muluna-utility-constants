[mod-name]
muluna-utility-constants=Muluna Utility Constants

[mod-description]
muluna-utility-constants=Modyfikuje niektóre stałe narzędziowe stanowiące podstawę silnika gry Factorio, aby lepiej dostosować się do stosowanych w Mulunie receptur o wysokim natężeniu przepływu. Może to powodować niepożądane skutki, dlatego każdą zmienną objętą modyfikacją można skonfigurować.

[mod-setting-name]
utility-constant-max-fluid-flow-multiplier=Maksymalny mnożnik przepływu płynów

[mod-setting-description]
utility-constant-max-fluid-flow-multiplier=Skaluje maksymalny przepływ płynów w maszynach w stosunku do domyślnej wartości 100/tick w podstawowej wersji gry. Obniż tę wartość, jeśli występują problemy z nierównomiernym rozkładem płynów.
